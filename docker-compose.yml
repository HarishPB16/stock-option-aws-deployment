version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mean-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/stock-options
      # Fallback dummy key to prevent crash if not injected
      - GEMINI_API_KEY=${GEMINI_API_KEY:-dummy_dev_key}
    depends_on:
      - mongodb
    networks:
      - mean-network

  # MongoDB running locally simulating AWS DocumentDB for dev
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mean-network

networks:
  mean-network:
    driver: bridge

volumes:
  mongo-data:
