name: Deploy Frontend to S3

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        working-directory: ./frontend
        # Make sure the frontend build folder is correct. Angular 18 usually outputs to `dist/<project-name>/browser`.
        # Assuming `dist/frontend/browser` based on existing documentation.
        run: aws s3 sync dist/frontend/browser s3://${{ secrets.AWS_S3_BUCKET }} --delete

      # Optional: Invalidate CloudFront cache if you have it configured.
      # You would need to add AWS_CLOUDFRONT_DISTRIBUTION_ID to your GitHub Secrets.
      # - name: Invalidate CloudFront Cache
      #   run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
