<div class="app-layout">
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-brand">
            <span class="logo-icon">📈</span>
            <span class="logo-text">AI Options Pro</span>
        </div>
        <div class="nav-links">
            <a routerLink="/home" routerLinkActive="active" class="nav-tab">Home</a>
            <a routerLink="/search-options" routerLinkActive="active" class="nav-tab">Search</a>
            <a routerLink="/top-picks" routerLinkActive="active" class="nav-tab border-accent">Top Picks ✨</a>
            <a routerLink="/history" routerLinkActive="active" class="nav-tab">History</a>
            <a routerLink="/admin" routerLinkActive="active" class="nav-tab admin-tab">Admin</a>
            
            <button class="theme-toggle-btn" (click)="toggleTheme()" [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'">
                {{ isDarkTheme ? '☀️' : '🌙' }}
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <router-outlet></router-outlet>
    </main>
</div>
