<div class="options-container history-container">
    <div class="header">
        <h1>Historical Analysis Tracker</h1>
        <p>Review deeply cached options insights driven by Gemini.</p>
    </div>

    <div class="alert alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
    </div>

    <div class="results-container" *ngIf="historyData && !isLoading">

        <div class="no-data" *ngIf="historyData.options.length === 0 && historyData.advice.length === 0">
            <p>No option records or AI logs found for {{ selectedDate | date:'mediumDate' }}.</p>
        </div>

        <div class="history-grid-container" *ngIf="historyData.options.length > 0">
            <div class="header" style="text-align: left;">
                <h2 class="section-title">In-Depth Analysis Records</h2>
            </div>
            <div class="history-grid" style="display: flex; flex-direction: column; gap: 3rem;">
                <div class="history-item-block" *ngFor="let opt of historyData.options">
                    <div class="stock-header">
                        <h2>{{ opt.stock }} <span class="badge badge-date"
                                style="font-size: 0.9rem; margin-left: 10px; vertical-align: middle;">{{ opt.createdAt |
                                date:'shortTime' }}</span></h2>
                    </div>

                    <app-option-stock-detail [insight]="opt" [simpleAdvice]="opt.simpleAdvice"
                        [isDeleting]="isDeleting[opt.stock] || false"
                        (deleteData)="deleteOption(opt.stock)"></app-option-stock-detail>
                </div>
            </div>
        </div>

    </div>
</div>
