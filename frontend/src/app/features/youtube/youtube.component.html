<div class="youtube-container">
  <!-- Header -->
  <header class="yt-header">
    <div class="logo">
      <span class="icon">▶</span>
      <h1>Vids</h1>
    </div>
    <div class="actions">
      <button class="icon-btn" routerLink="/admin/youtube">
        <span class="plus-icon">+</span> Upload
      </button>
    </div>
  </header>

  <!-- Category Filter Bar -->
  <div class="category-filters-wrapper">
    <div class="category-filters">
      <button 
        *ngFor="let cat of categories" 
        class="filter-chip" 
        [class.active]="selectedCategory === cat"
        (click)="selectCategory(cat)"
      >
        {{ cat }}
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading-state">
    <div class="shimmer-card" *ngFor="let item of [1,2,3,4,5,6,7,8]">
      <div class="shimmer-thumbnail"></div>
      <div class="shimmer-text"></div>
    </div>
  </div>

  <!-- Video Grid -->
  <main class="video-grid" *ngIf="!loading">
    <div class="video-card" *ngFor="let video of videos" (click)="openVideo(video)">
      <div class="thumbnail-wrapper">
        <img [src]="getThumbnailUrl(video)" [alt]="video.title || 'Video Title'" class="thumbnail" />
        <div class="play-overlay">
          <span class="play-icon">▶</span>
        </div>
      </div>
      <div class="video-info">
        <h3 class="video-title">{{ video.title || 'Untitled Video' }}</h3>
        <p class="video-meta">Uploaded on {{ video.createdAt | date:'mediumDate' }}</p>
      </div>
    </div>
  </main>

  <div class="empty-state" *ngIf="!loading && videos.length === 0">
    <p>No videos available. Ask an Admin to add some!</p>
  </div>
</div>

<!-- Video Popup Modal -->
<div class="modal-overlay" *ngIf="selectedVideo" (click)="closeVideo()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeVideo()">×</button>
    <div class="video-player-container">
      <div id="yt-player"></div>
    </div>
    <div class="modal-info">
      <h2 class="modal-title">{{ selectedVideo.title || 'Untitled Video' }}</h2>
    </div>
  </div>
</div>
