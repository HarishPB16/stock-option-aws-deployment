<div class="admin-container">
  <div class="admin-card">
    <div class="card-header">
      <div class="icon-wrapper">
        <span class="plus-icon">+</span>
      </div>
      <h2>Add Youtube Video</h2>
      <p>Submit a YouTube link below and we will automatically harvest the thumbnail and add it to the user page layout.</p>
    </div>

    <form [formGroup]="videoForm" (ngSubmit)="onSubmit()" class="admin-form">
      <!-- Title Input -->
      <div class="form-group" [class.has-error]="videoForm.get('title')?.invalid && videoForm.get('title')?.touched">
        <label for="title">Video Title <span class="required">*</span></label>
        <input 
          id="title" 
          type="text" 
          formControlName="title" 
          placeholder="Enter an aesthetic title"
          [attr.disabled]="isSubmitting ? true : null"
        />
        <div class="error-msg" *ngIf="videoForm.get('title')?.invalid && videoForm.get('title')?.touched">
          Please enter a video title.
        </div>
      </div>

      <!-- URL Input -->
      <div class="form-group" [class.has-error]="videoForm.get('url')?.invalid && videoForm.get('url')?.touched">
        <label for="url">YouTube URL <span class="required">*</span></label>
        <input 
          id="url" 
          type="url" 
          formControlName="url" 
          placeholder="https://www.youtube.com/watch?v=..."
          [attr.disabled]="isSubmitting ? true : null"
        />
        <div class="error-msg" *ngIf="videoForm.get('url')?.invalid && videoForm.get('url')?.touched">
          Please enter a valid YouTube URL.
        </div>
      </div>

      <!-- Parent Category Select -->
      <div class="form-group parent-cat-group">
        <label for="parentCategory">Parent Category</label>
        <select 
          id="parentCategory" 
          class="form-select parent-select" 
          (change)="onParentCategoryChange($event)"
          [disabled]="isSubmitting"
        >
          <option *ngFor="let pCat of parentCategories" [value]="pCat">{{ pCat | titlecase }}</option>
        </select>
      </div>

      <!-- Categories Checkboxes -->
      <div class="form-group categories-group">
        <label>Select Sub-Categories</label>
        <div class="checkbox-grid">
          <label class="checkbox-label" *ngFor="let cat of availableCategories">
            <input 
              type="checkbox" 
              [checked]="selectedCategories.includes(cat)"
              (change)="toggleCategory(cat)"
              [disabled]="isSubmitting"
            />
            <span class="custom-checkbox"></span>
            {{ cat }}
          </label>
        </div>
      </div>

      <!-- Status Messages -->
      <div class="alert success-alert" *ngIf="successMessage">
        <span class="alert-icon">✓</span> {{ successMessage }}
      </div>
      <div class="alert error-alert" *ngIf="errorMessage">
        <span class="alert-icon">!</span> {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="submit-btn" 
        [disabled]="videoForm.invalid || isSubmitting"
        [class.loading]="isSubmitting"
      >
        <span class="btn-text" *ngIf="!isSubmitting">Add Video to Vids Page</span>
        <span class="spinner" *ngIf="isSubmitting"></span>
      </button>

      <div class="back-link">
        <a routerLink="/youtube">View Youtube Page &rarr;</a>
      </div>
    </form>
  </div>
</div>
