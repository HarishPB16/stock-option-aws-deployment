<div class="admin-container">
  <div class="admin-card">
    <div class="card-header">
      <div class="icon-wrapper">
        <span class="plus-icon">+</span>
      </div>
      <h2>Add New Game</h2>
      <p>Submit a game link below to feature it in the Games page layout.</p>
    </div>

    <form [formGroup]="gameForm" (ngSubmit)="onSubmit()" class="admin-form">
      <div class="form-group" [class.has-error]="gameForm.get('name')?.invalid && gameForm.get('name')?.touched">
        <label for="name">Game Name <span class="required">*</span></label>
        <input 
          id="name" 
          type="text" 
          formControlName="name" 
          placeholder="Enter the name of the game"
          [attr.disabled]="isSubmitting ? true : null"
        />
        <div class="error-msg" *ngIf="gameForm.get('name')?.invalid && gameForm.get('name')?.touched">
          Please enter the game's name.
        </div>
      </div>

      <div class="form-group" [class.has-error]="gameForm.get('url')?.invalid && gameForm.get('url')?.touched">
        <label for="url">Game URL <span class="required">*</span></label>
        <input 
          id="url" 
          type="url" 
          formControlName="url" 
          placeholder="https://..."
          [attr.disabled]="isSubmitting ? true : null"
        />
        <div class="error-msg" *ngIf="gameForm.get('url')?.invalid && gameForm.get('url')?.touched">
          Please enter a valid URL.
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea 
          id="description" 
          formControlName="description" 
          rows="4"
          placeholder="Brief description of the game..."
          [attr.disabled]="isSubmitting ? true : null"
        ></textarea>
      </div>

      <!-- Status Messages -->
      <div class="alert success-alert" *ngIf="successMessage">
        <span class="alert-icon">✓</span> {{ successMessage }}
      </div>
      <div class="alert error-alert" *ngIf="errorMessage">
        <span class="alert-icon">!</span> {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="submit-btn" 
        [disabled]="gameForm.invalid || isSubmitting"
        [class.loading]="isSubmitting"
      >
        <span class="btn-text" *ngIf="!isSubmitting">Add Game</span>
        <span class="spinner" *ngIf="isSubmitting"></span>
      </button>

      <div class="back-link">
        <a routerLink="/games">View Games Page &rarr;</a>
      </div>
    </form>
  </div>
</div>
