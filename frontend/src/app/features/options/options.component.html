<div class="options-container">
  <div class="header">
    <h1>AI Stock Options Engine</h1>
    <p>Enterprise-grade Option Suggestions by Gemini</p>
  </div>

  <div class="search-card">
    <form [formGroup]="optionForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <input type="text" formControlName="ticker" placeholder="ENTER TICKER (e.g. AAPL)" class="ticker-input"
          [class.is-invalid]="optionForm.get('ticker')?.invalid && optionForm.get('ticker')?.touched"
          autocomplete="off">
        <button type="submit" [disabled]="isLoading" class="submit-btn" [class.loading]="isLoading">
          <span *ngIf="!isLoading">Analyze</span>
          <span *ngIf="isLoading" class="spinner">↻</span>
        </button>
      </div>
      <div class="error-text"
        *ngIf="optionForm.get('ticker')?.errors?.['required'] && optionForm.get('ticker')?.touched">
        Ticker is required.
      </div>
    </form>
  </div>

  <!-- Error Alert -->
  <div class="alert alert-error" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <app-option-stock-detail *ngIf="insight && !isLoading" [insight]="insight" [simpleAdvice]="simpleAdvice"
    [isAdviceCached]="isAdviceCached" [isDeleting]="isDeleting" (deleteData)="onDelete()">
  </app-option-stock-detail>
